# Render 一键部署排盘 API（免费 Web Service）
# 使用：Render 控制台 New → Blueprint → 选本仓库，按提示连接 GitHub。
# 部署完成后把公网 URL（如 https://bazi-api-xxxx.onrender.com）填到 GitHub 仓库变量 BAZI_API_BASE，再跑一次 Pages 工作流。
services:
  - type: web
    name: bazi-api
    runtime: python
    plan: free
    rootDir: web-bazi-app/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
