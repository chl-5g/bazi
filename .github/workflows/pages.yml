# 静态前端 → GitHub Pages：https://chl-5g.github.io/bazi/
name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build static site
        env:
          # 在仓库 Settings → Secrets and variables → Actions → Variables 新建 BAZI_API_BASE
          # 值为 Render 等上部署的 API 根，如 https://bazi-api-xxxx.onrender.com（不要末尾 /）
          BAZI_API_BASE: ${{ vars.BAZI_API_BASE }}
        run: |
          mkdir -p _site/ai-fortune
          cp web-bazi-app/frontend/index.html _site/
          cp web-bazi-app/frontend/ai-fortune/ai-fortune.js _site/ai-fortune/
          touch _site/.nojekyll
          if [ -n "${BAZI_API_BASE}" ]; then
            printf 'window.__BAZI_API_BASE__ = "%s";\n' "${BAZI_API_BASE}" > _site/config.js
          else
            cp web-bazi-app/frontend/config.js _site/config.js
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
